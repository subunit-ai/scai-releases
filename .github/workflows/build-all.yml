# SCAI — Build & Release für ALLE Plattformen.
#
# WARUM hier (im PUBLIC scai-releases) statt im privaten subunit-scai:
# GitHub rechnet Actions-Minuten nach dem Repo ab, in dem der Workflow LÄUFT.
# `subunit-scai` ist privat → dessen Actions hängen an der Org-Billing-Sperre.
# `scai-releases` ist public → Actions sind hier KOSTENLOS. Der Quellcode wird
# per read-only Deploy-Key ausgecheckt.
#
# SICHERHEIT: Trigger ist AUSSCHLIESSLICH workflow_dispatch (kein pull_request).
# Forks können den Workflow damit nicht mit unseren Secrets ausführen — nur wer
# Schreibrechte auf dieses Repo hat, kann ihn starten.
#
# Ergebnis: EIN Release mit Installern für jede Plattform (dmg/app, nsis-Setup,
# deb/AppImage) + ein vollständiges `latest.json`, das den Tauri-Updater für
# ALLE Plattformen bedient.

name: Build & Release (alle Plattformen)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref im Quell-Repo (Tag, Branch oder SHA)"
        required: true
        default: "main"
      prerelease:
        description: "Als Vorab-Version markieren"
        type: boolean
        default: false

permissions:
  contents: write # Release anlegen + Assets hochladen (in DIESEM Repo)

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false # eine kaputte Plattform darf die anderen nicht mitreißen
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - label: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
          - label: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: Windows (ARM64)
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis
          - label: Linux (x64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}

    steps:
      # Bewusst KEIN actions/checkout mit ssh-key: der windows-11-arm-Runner hat
      # kein funktionierendes C:\Windows\System32\OpenSSH\ssh.exe (Checkout schlug
      # dort mit "Could not read from remote repository" fehl). Ein Klon über Git
      # Bash nutzt das von Git mitgelieferte ssh und läuft auf ALLEN Runnern.
      # Ref + Key kommen über env (nicht inline in run:) — Injection-sicher.
      - name: Quellcode auschecken (privates Repo, read-only Deploy-Key)
        shell: bash
        env:
          SRC_REF: ${{ inputs.ref }}
          DEPLOY_KEY: ${{ secrets.SOURCE_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_KEY" > "$HOME/.ssh/scai_src"
          chmod 600 "$HOME/.ssh/scai_src"
          ssh-keyscan -t ed25519,rsa github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/scai_src -o IdentitiesOnly=yes"
          git clone --depth 1 --branch "$SRC_REF" git@github.com:subunit-ai/subunit-scai.git src
          rm -f "$HOME/.ssh/scai_src"
          echo "ausgecheckt: $SRC_REF → $(git -C src rev-parse --short HEAD)"

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Rust einrichten (Ziel ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Linux-Systemabhängigkeiten (WebKit/GTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Abhängigkeiten installieren
        working-directory: src
        run: npm ci

      # macOS-CODESIGNATUR — der Grund, warum erteilte Berechtigungen ein Update überleben.
      #
      # Ohne diesen Schritt signiert Tauri ad-hoc ("-" aus tauri.conf.json). Eine ad-hoc-
      # Signatur hat KEINE Zertifikatskette, also kann codesign die Designated Requirement
      # nur an den nackten Code-Hash binden:  designated => cdhash H"dc76bb05…"
      # Jeder Build erzeugt einen anderen cdhash → für macOS ist das eine ANDERE App →
      # die TCC-Grants (Mikrofon, Bildschirmaufnahme, Bedienungshilfen, Eingabeüberwachung,
      # Ordner) passen nicht mehr und sind nach dem Update wertlos. Der Haken in den
      # Systemeinstellungen bleibt sichtbar stehen, wirkt aber nicht — genau TJs Symptom.
      #
      # Mit einer echten Identität leitet codesign die DR aus dem Zertifikat ab:
      #   designated => identifier "ai.subunit.scai" and certificate leaf = H"…"
      # Bundle-ID und Leaf-Zert sind über alle Builds identisch → die Grants halten.
      # Belegt an echo.app, das exakt so signiert wird und seine Grants behält.
      #
      # Warum die Keychain-Arbeit hier und nicht via tauri-action: das Zert ist SELBST-
      # SIGNIERT, und codesign verweigert eine untrusted Identity (CSSMERR_TP_NOT_TRUSTED).
      # tauri-action importiert ein APPLE_CERTIFICATE zwar, VERTRAUT ihm aber nie —
      # deshalb machen wir Import + add-trusted-cert selbst und geben tauri-action
      # bewusst NUR die Identity (kein APPLE_CERTIFICATE, sonst re-importiert es untrusted).
      - name: macOS-Signatur vorbereiten (stabiles Zert — hält TCC-Grants über Updates)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "kein Zert konfiguriert — bleibe ad-hoc"
            exit 0
          fi

          echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/scai-sign.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security set-keychain-settings -lut 21600 build.keychain # kein Auto-Lock mitten im Build
          security import /tmp/scai-sign.p12 -k build.keychain \
            -P "${APPLE_CERTIFICATE_PASSWORD:-}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k ci build.keychain > /dev/null
          # Der Vertrauens-Schritt, den tauri-action nicht macht:
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p build.keychain > /tmp/scai-sign.pem
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain /tmp/scai-sign.pem
          rm /tmp/scai-sign.p12
          echo "gültige Codesigning-Identitäten:"
          security find-identity -v -p codesigning build.keychain

          # Variablen ERST JETZT scharf schalten — bewusst über GITHUB_ENV statt im
          # env-Block des tauri-action-Steps: ein nicht gesetztes GitHub-Secret liefert
          # dort einen LEEREN String, die Variable wäre also trotzdem definiert. Tauri
          # würde dann mit leerer Identität signieren wollen. "Nicht definiert" ist
          # eindeutig, "leer" nicht — deshalb setzen wir sie nur, wenn wirklich was da ist.
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

          # NOTARISIERUNG (später, mit Developer ID): Tauri notarisiert automatisch,
          # sobald APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID gesetzt sind. Beim
          # selbstsignierten Zert gibt es die nicht → wir reichen sie nicht durch, es
          # gibt keinen Notarisierungs-Versuch, der Build bleibt un-notarisiert
          # (Gatekeeper: beim ersten Start Rechtsklick → Öffnen).
          # Der Umstieg auf Developer ID ist damit ein reiner SECRET-TAUSCH — kein Code.
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "Developer-ID-Zugangsdaten vorhanden — Notarisierung wird angefordert"
            {
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "keine Notarisierungs-Zugangsdaten — Build bleibt un-notarisiert"
          fi

      - name: Bauen · signieren · Release-Assets hochladen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater-Signatur (minisign, derselbe Key wie beim lokalen Mac-Release) —
          # das ist NUR der Update-Mechanismus, nicht die Code-Signatur der App.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_SIGNING_IDENTITY (und ggf. APPLE_ID/_PASSWORD/_TEAM_ID) kommen aus dem
          # Schritt oben über GITHUB_ENV. Hier bewusst NICHT auflisten: ein env-Eintrag
          # im Step überschreibt den GITHUB_ENV-Wert — mit einem leeren String, falls das
          # Secret fehlt. Und APPLE_CERTIFICATE gehört hier ohnehin nie hin (untrusted
          # Re-Import, siehe oben).
        with:
          projectPath: src
          # Tag/Version kommen aus src-tauri/tauri.conf.json.
          tagName: v__VERSION__
          releaseName: SCAI v__VERSION__
          releaseBody: |
            SCAI v__VERSION__ — Installer für macOS (Apple Silicon & Intel), Windows (x64 & ARM64) und Linux.

            Auto-Update ist für alle Plattformen verdrahtet (`latest.json`).
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          # Merged die Plattform-Einträge aller Matrix-Jobs in EIN latest.json
          # → der Updater bedient damit jede Plattform.
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
