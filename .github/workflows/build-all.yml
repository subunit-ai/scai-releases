# SCAI — Build & Release für ALLE Plattformen.
#
# WARUM hier (im PUBLIC scai-releases) statt im privaten subunit-scai:
# GitHub rechnet Actions-Minuten nach dem Repo ab, in dem der Workflow LÄUFT.
# `subunit-scai` ist privat → dessen Actions hängen an der Org-Billing-Sperre.
# `scai-releases` ist public → Actions sind hier KOSTENLOS. Der Quellcode wird
# per read-only Deploy-Key ausgecheckt.
#
# SICHERHEIT: Trigger ist AUSSCHLIESSLICH workflow_dispatch (kein pull_request).
# Forks können den Workflow damit nicht mit unseren Secrets ausführen — nur wer
# Schreibrechte auf dieses Repo hat, kann ihn starten.
#
# Ergebnis: EIN Release mit Installern für jede Plattform (dmg/app, nsis-Setup,
# deb/AppImage) + ein vollständiges `latest.json`, das den Tauri-Updater für
# ALLE Plattformen bedient.

name: Build & Release (alle Plattformen)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref im Quell-Repo (Tag, Branch oder SHA)"
        required: true
        default: "main"
      prerelease:
        description: "Als Vorab-Version markieren"
        type: boolean
        default: false

permissions:
  contents: write # Release anlegen + Assets hochladen (in DIESEM Repo)

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false # eine kaputte Plattform darf die anderen nicht mitreißen
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - label: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
          - label: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: Windows (ARM64)
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis
          - label: Linux (x64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}

    steps:
      # Bewusst KEIN actions/checkout mit ssh-key: der windows-11-arm-Runner hat
      # kein funktionierendes C:\Windows\System32\OpenSSH\ssh.exe (Checkout schlug
      # dort mit "Could not read from remote repository" fehl). Ein Klon über Git
      # Bash nutzt das von Git mitgelieferte ssh und läuft auf ALLEN Runnern.
      # Ref + Key kommen über env (nicht inline in run:) — Injection-sicher.
      - name: Quellcode auschecken (privates Repo, read-only Deploy-Key)
        shell: bash
        env:
          SRC_REF: ${{ inputs.ref }}
          DEPLOY_KEY: ${{ secrets.SOURCE_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_KEY" > "$HOME/.ssh/scai_src"
          chmod 600 "$HOME/.ssh/scai_src"
          ssh-keyscan -t ed25519,rsa github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/scai_src -o IdentitiesOnly=yes"
          git clone --depth 1 --branch "$SRC_REF" git@github.com:subunit-ai/subunit-scai.git src
          rm -f "$HOME/.ssh/scai_src"
          echo "ausgecheckt: $SRC_REF → $(git -C src rev-parse --short HEAD)"

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Rust einrichten (Ziel ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Linux-Systemabhängigkeiten (WebKit/GTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Abhängigkeiten installieren
        working-directory: src
        run: npm ci

      # macOS-CODESIGNATUR — der Grund, warum erteilte Berechtigungen ein Update überleben.
      #
      # Ohne diesen Schritt signiert Tauri ad-hoc ("-" aus tauri.conf.json). Eine ad-hoc-
      # Signatur hat KEINE Zertifikatskette, also kann codesign die Designated Requirement
      # nur an den nackten Code-Hash binden:  designated => cdhash H"dc76bb05…"
      # Jeder Build erzeugt einen anderen cdhash → für macOS ist das eine ANDERE App →
      # die TCC-Grants (Mikrofon, Bildschirmaufnahme, Bedienungshilfen, Eingabeüberwachung,
      # Ordner) passen nicht mehr und sind nach dem Update wertlos. Der Haken in den
      # Systemeinstellungen bleibt sichtbar stehen, wirkt aber nicht — genau TJs Symptom.
      #
      # Mit einer echten Identität leitet codesign die DR aus dem Zertifikat ab:
      #   designated => identifier "ai.subunit.scai" and certificate leaf = H"…"
      # Bundle-ID und Leaf-Zert sind über alle Builds identisch → die Grants halten.
      # Belegt an echo.app, das exakt so signiert wird und seine Grants behält.
      #
      # Warum die Keychain-Arbeit hier und nicht via tauri-action: das Zert ist SELBST-
      # SIGNIERT, und codesign verweigert eine untrusted Identity (CSSMERR_TP_NOT_TRUSTED).
      # tauri-action importiert ein APPLE_CERTIFICATE zwar, VERTRAUT ihm aber nie —
      # deshalb machen wir Import + add-trusted-cert selbst und geben tauri-action
      # bewusst NUR die Identity (kein APPLE_CERTIFICATE, sonst re-importiert es untrusted).
      - name: macOS-Signatur vorbereiten (stabiles Zert — hält TCC-Grants über Updates)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Der Tag, auf dem gebaut wird — entscheidet über fail-closed (siehe unten).
          REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            # FAIL-CLOSED bei echten Releases. Ein durchgewunkener ad-hoc-Build sieht in
            # der CI genauso grün aus wie ein signierter — nur dass er bei JEDEM Kunden
            # sämtliche macOS-Berechtigungen killt, still und unbemerkt. Genau dieser
            # stille Pfad hat uns das Problem eingebrockt. Für einen Version-Tag ist ein
            # fehlendes Zertifikat deshalb ein ABBRUCH, kein Achselzucken.
            case "${REF:-}" in
              v[0-9]*)
                echo "::error::Release $REF ohne Code-Signing-Zertifikat — Abbruch."
                echo "APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY fehlen in den Repo-Secrets."
                echo "Ad-hoc signiert = Designated Requirement ist ein cdhash-Pin = jeder"
                echo "Kunde muss nach dem Update alle Berechtigungen neu erteilen."
                exit 1
                ;;
            esac
            echo "kein Zert konfiguriert — Testbuild bleibt ad-hoc"
            exit 0
          fi

          echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/scai-sign.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security set-keychain-settings -lut 21600 build.keychain # kein Auto-Lock mitten im Build
          security import /tmp/scai-sign.p12 -k build.keychain \
            -P "${APPLE_CERTIFICATE_PASSWORD:-}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k ci build.keychain > /dev/null
          # Der Vertrauens-Schritt, den tauri-action nicht macht. Seit dem Umstieg auf
          # das Apple-Development-Zert (2026-07-19, Team Y23NYAZM6M — bringt teamid:-
          # Partition = Schlüsselbund-Freigaben überleben Updates) validiert die Kette
          # über das im p12 mitgelieferte WWDR-G3-Zwischenzert + Apple-Root des Runners
          # von selbst; der trustRoot-Pin ist nur noch der Fallback für ein etwaiges
          # self-signed Zert und darf den Build deshalb NIE mehr abbrechen.
          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p build.keychain > /tmp/scai-sign.pem
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain /tmp/scai-sign.pem \
            || echo "trustRoot-Pin übersprungen (Apple-gekettetes Zert braucht ihn nicht)"
          rm /tmp/scai-sign.p12
          echo "gültige Codesigning-Identitäten:"
          security find-identity -v -p codesigning build.keychain

          # Variablen ERST JETZT scharf schalten — bewusst über GITHUB_ENV statt im
          # env-Block des tauri-action-Steps: ein nicht gesetztes GitHub-Secret liefert
          # dort einen LEEREN String, die Variable wäre also trotzdem definiert. Tauri
          # würde dann mit leerer Identität signieren wollen. "Nicht definiert" ist
          # eindeutig, "leer" nicht — deshalb setzen wir sie nur, wenn wirklich was da ist.
          echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"

          # NOTARISIERUNG (später, mit Developer ID): Tauri notarisiert automatisch,
          # sobald APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID gesetzt sind. Beim
          # selbstsignierten Zert gibt es die nicht → wir reichen sie nicht durch, es
          # gibt keinen Notarisierungs-Versuch, der Build bleibt un-notarisiert
          # (Gatekeeper: beim ersten Start Rechtsklick → Öffnen).
          # Der Umstieg auf Developer ID ist damit ein reiner SECRET-TAUSCH — kein Code.
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "Developer-ID-Zugangsdaten vorhanden — Notarisierung wird angefordert"
            {
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "keine Notarisierungs-Zugangsdaten — Build bleibt un-notarisiert"
          fi

      - name: Bauen · signieren · Release-Assets hochladen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater-Signatur (minisign, derselbe Key wie beim lokalen Mac-Release) —
          # das ist NUR der Update-Mechanismus, nicht die Code-Signatur der App.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_SIGNING_IDENTITY (und ggf. APPLE_ID/_PASSWORD/_TEAM_ID) kommen aus dem
          # Schritt oben über GITHUB_ENV. Hier bewusst NICHT auflisten: ein env-Eintrag
          # im Step überschreibt den GITHUB_ENV-Wert — mit einem leeren String, falls das
          # Secret fehlt. Und APPLE_CERTIFICATE gehört hier ohnehin nie hin (untrusted
          # Re-Import, siehe oben).
        with:
          projectPath: src
          # Tag/Version kommen aus src-tauri/tauri.conf.json.
          tagName: v__VERSION__
          releaseName: SCAI v__VERSION__
          releaseBody: |
            SCAI v__VERSION__ — Installer für macOS (Apple Silicon & Intel), Windows (x64 & ARM64) und Linux.

            Auto-Update ist für alle Plattformen verdrahtet (`latest.json`).
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          # Merged die Plattform-Einträge aller Matrix-Jobs in EIN latest.json
          # → der Updater bedient damit jede Plattform.
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      # BEWEIS STATT BEHAUPTUNG. Der Keychain-Schritt oben kann grün sein und die App
      # trotzdem ad-hoc signiert rauskommen (falsche Identity, Tauri ignoriert die env,
      # Zert nicht vertraut) — und niemand merkt es, weil ein ad-hoc-Build genauso
      # aussieht wie ein signierter. Wir MESSEN das Ergebnis deshalb am gebauten .app:
      #
      #   ad-hoc   → designated => cdhash H"…"        (Hash-Pin, bricht bei JEDEM Update)
      #   signiert → designated => identifier "…" and certificate leaf = H"…"  (stabil)
      #
      # Nur die zweite Form lässt macOS die erteilten TCC-Rechte über ein Update hinweg
      # wiedererkennen. Ist sie nicht da, ist der Release wertlos — also Abbruch.
      - name: Signatur am gebauten .app VERIFIZIEREN (nicht glauben — messen)
        if: runner.os == 'macOS'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          APP=$(find "src/src-tauri/target/$TARGET/release/bundle/macos" -maxdepth 1 -name '*.app' | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Kein .app-Bundle gefunden — Verifikation unmöglich."
            exit 1
          fi
          echo "Prüfe: $APP"
          codesign -dv --verbose=4 "$APP" 2>&1 | tee /tmp/sig.txt
          echo "── Designated Requirement ──"
          codesign -d --requirements - "$APP" 2>&1 | tee /tmp/dr.txt

          if grep -q "Signature=adhoc" /tmp/sig.txt; then
            echo "::error::Das ausgelieferte .app ist AD-HOC signiert. Alle Kunden-Berechtigungen würden beim Update sterben."
            exit 1
          fi
          if grep -q "cdhash" /tmp/dr.txt && ! grep -q "certificate leaf" /tmp/dr.txt; then
            echo "::error::Designated Requirement ist ein cdhash-Pin statt zertifikatsbasiert — Berechtigungen überleben kein Update."
            exit 1
          fi
          if ! grep -q "certificate leaf\|anchor apple generic" /tmp/dr.txt; then
            echo "::error::Designated Requirement enthält keine Zertifikats-Bindung."
            exit 1
          fi
          echo "OK — Signatur ist zertifikatsgebunden, TCC-Grants überleben Updates."

  # ── latest.json vollständig + rennfrei zusammenbauen ─────────────────────────
  # WARUM (Details: scripts/assemble-latest-json.py): Die build-Matrix oben läuft
  # PARALLEL, und jeder Job lädt per includeUpdaterJson sein eigenes latest.json ins
  # Release (read-modify-write ohne Lock). Der letzte Upload gewinnt → das Manifest
  # enthält oft nur 1-2 Plattformen, der Rest (z.B. darwin-aarch64) fehlt und deren
  # Nutzer bekommen NIE ein Update angeboten. (Eingetreten bei v0.40.0.) Dieser Job
  # läuft NACH allen Builds und baut EIN vollständiges Manifest aus ALLEN .sig-Assets
  # des Release — deterministisch, ein einziger Upload, kein Race.
  assemble-manifest:
    name: latest.json vollständig zusammenbauen
    needs: build
    # Nur für echte Release-Tags (vX.Y.Z) — Test-Builds von einem Branch/SHA brauchen
    # kein Updater-Manifest und hätten keine eindeutige Version.
    if: startsWith(inputs.ref, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Assembler-Script holen (dieses Repo)
        uses: actions/checkout@v4

      - name: Alle Release-Signaturen laden · Manifest bauen · hochladen
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          NOTES="SCAI $TAG — Installer für macOS (Apple Silicon & Intel), Windows (x64 & ARM64) und Linux.

          Auto-Update ist für alle Plattformen verdrahtet (latest.json)."
          mkdir -p sigs
          # Alle Updater-Signaturen des gerade gebauten Release holen.
          gh release download "$TAG" -R "$REPO" -p '*.sig' -D sigs --clobber
          echo "Geladene Signaturen:"; ls -1 sigs
          python3 scripts/assemble-latest-json.py sigs "$VERSION" "$BASE" "$NOTES" latest.json
          echo "── erzeugtes Manifest ──"
          python3 -c "import json;d=json.load(open('latest.json'));print('version',d['version'],'· plattformen',sorted(d['platforms']))"
          # Das (evtl. unvollständige) latest.json der parallelen Jobs ersetzen.
          gh release upload "$TAG" latest.json -R "$REPO" --clobber
          echo "✅ vollständiges latest.json auf $TAG hochgeladen."
