# SCAI — Build & Release für ALLE Plattformen.
#
# WARUM hier (im PUBLIC scai-releases) statt im privaten subunit-scai:
# GitHub rechnet Actions-Minuten nach dem Repo ab, in dem der Workflow LÄUFT.
# `subunit-scai` ist privat → dessen Actions hängen an der Org-Billing-Sperre.
# `scai-releases` ist public → Actions sind hier KOSTENLOS. Der Quellcode wird
# per read-only Deploy-Key ausgecheckt.
#
# SICHERHEIT: Trigger ist AUSSCHLIESSLICH workflow_dispatch (kein pull_request).
# Forks können den Workflow damit nicht mit unseren Secrets ausführen — nur wer
# Schreibrechte auf dieses Repo hat, kann ihn starten.
#
# Ergebnis: EIN Release mit Installern für jede Plattform (dmg/app, nsis-Setup,
# deb/AppImage) + ein vollständiges `latest.json`, das den Tauri-Updater für
# ALLE Plattformen bedient.

name: Build & Release (alle Plattformen)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref im Quell-Repo (Tag, Branch oder SHA)"
        required: true
        default: "main"
      prerelease:
        description: "Als Vorab-Version markieren"
        type: boolean
        default: false

permissions:
  contents: write # Release anlegen + Assets hochladen (in DIESEM Repo)

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false # eine kaputte Plattform darf die anderen nicht mitreißen
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - label: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
          - label: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - label: Windows (ARM64)
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis
          - label: Linux (x64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
    runs-on: ${{ matrix.os }}

    steps:
      # Bewusst KEIN actions/checkout mit ssh-key: der windows-11-arm-Runner hat
      # kein funktionierendes C:\Windows\System32\OpenSSH\ssh.exe (Checkout schlug
      # dort mit "Could not read from remote repository" fehl). Ein Klon über Git
      # Bash nutzt das von Git mitgelieferte ssh und läuft auf ALLEN Runnern.
      # Ref + Key kommen über env (nicht inline in run:) — Injection-sicher.
      - name: Quellcode auschecken (privates Repo, read-only Deploy-Key)
        shell: bash
        env:
          SRC_REF: ${{ inputs.ref }}
          DEPLOY_KEY: ${{ secrets.SOURCE_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_KEY" > "$HOME/.ssh/scai_src"
          chmod 600 "$HOME/.ssh/scai_src"
          ssh-keyscan -t ed25519,rsa github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/scai_src -o IdentitiesOnly=yes"
          git clone --depth 1 --branch "$SRC_REF" git@github.com:subunit-ai/subunit-scai.git src
          rm -f "$HOME/.ssh/scai_src"
          echo "ausgecheckt: $SRC_REF → $(git -C src rev-parse --short HEAD)"

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Rust einrichten (Ziel ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Linux-Systemabhängigkeiten (WebKit/GTK)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev

      - name: Abhängigkeiten installieren
        working-directory: src
        run: npm ci

      - name: Bauen · signieren · Release-Assets hochladen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater-Signatur (derselbe Key wie beim lokalen Mac-Release).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src
          # Tag/Version kommen aus src-tauri/tauri.conf.json.
          tagName: v__VERSION__
          releaseName: SCAI v__VERSION__
          releaseBody: |
            SCAI v__VERSION__ — Installer für macOS (Apple Silicon & Intel), Windows (x64 & ARM64) und Linux.

            Auto-Update ist für alle Plattformen verdrahtet (`latest.json`).
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          # Merged die Plattform-Einträge aller Matrix-Jobs in EIN latest.json
          # → der Updater bedient damit jede Plattform.
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
